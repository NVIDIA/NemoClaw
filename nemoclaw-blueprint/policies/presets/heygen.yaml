preset:
  name: heygen
  description: "HeyGen API access for AI video generation, avatars, and streaming"

network_policies:
  heygen:
    name: heygen
    endpoints:
      - host: api.heygen.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: upload.heygen.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
      - host: files.heygen.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
