preset:
  name: pypi
  description: "Python Package Index (PyPI) access"

network_policies:
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    # Without binaries, OpenShell may treat the endpoint as not usable
    # by any executable and return 403 Forbidden.
    binaries:
      - { path: /usr/local/bin/python }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/pip }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/pip }
