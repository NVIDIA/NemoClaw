preset:
  name: apt
  description: "Debian and Ubuntu package repositories"

network_policies:
  apt_repositories:
    name: apt_repositories
    endpoints:
      - host: archive.ubuntu.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: security.ubuntu.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: deb.debian.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
